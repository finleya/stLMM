name: pkgdown

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            any::dplyr
            any::lwgeom
            any::nimble
            any::RhpcBLASctl
            any::scales
            any::spdep
            any::tidyr
          needs: website

      - name: Restore article cache
        uses: actions/cache@v4
        with:
          path: cache/articles
          key: ${{ runner.os }}-article-cache-${{ hashFiles('vignettes/wa-direct-*.qmd', 'vignettes/article-cache.R', 'vignettes/article-utils.R', 'vignettes/wa_data/**') }}

      - name: Install stLMM
        run: R CMD INSTALL .

      - name: Build site
        shell: bash
        run: |
          set +e
          set -o pipefail
          Rscript -e 'options(pkgdown.internet = FALSE); status <- 0L; tryCatch(pkgdown::build_site(".", install = FALSE, preview = FALSE), error = function(e) { message(conditionMessage(e)); status <<- 1L }); if (status != 0L) { message("Rerunning article build with quiet = FALSE"); try(pkgdown::build_articles(".", quiet = FALSE, lazy = FALSE, preview = FALSE), silent = FALSE) }; quit(status = status)' 2>&1 | tee pkgdown-build.log
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo "### pkgdown build failed"
              echo
              echo '```'
              tail -n 120 pkgdown-build.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$status"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pkgdown-build-log
          path: pkgdown-build.log
          if-no-files-found: ignore

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
